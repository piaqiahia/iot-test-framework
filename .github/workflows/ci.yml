name: IoT Platform E2E Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start all services
        run: |
          cd docker
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          cd ..

      - name: Wait for JetLinks to be ready
        run: |
          echo "Waiting for JetLinks API..."
          for i in {1..60}; do
            if curl -s http://localhost:8848/authorize/login > /dev/null; then
              echo "JetLinks is ready!"
              break
            fi
            sleep 3
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        working-directory: test_jetlinks
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Run tests
        continue-on-error: true
        working-directory: test_jetlinks
        env:
          PYTHONPATH: ${{ github.workspace }}
          ALLURE_ENABLED: true
        run: |
          pytest --alluredir=allure-results -s --force-exit || true
          echo "测试完成，查看 allure-results..."
          ls -la allure-results/ || echo "目录不存在"

      - name: Debug allure-results
        if: always()
        working-directory: test_jetlinks
        run: |
          pwd
          ls -la allure-results/ || echo "allure-results 目录不存在"
          ls -la allure-results/*.json || echo "allure-results 中没有 JSON 文件"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: test_jetlinks/allure-results/

      - name: Generate Allure report
        if: always()
        working-directory: test_jetlinks
        run: |
          # ... 安装 allure ...
          ./allure-.../bin/allure generate allure-results -o allure-report --clean
          echo "报告生成完毕"
          ls -la allure-report/
          
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report   # 报告目录
          destination_dir: .             # 可选，直接发布到根目录
          keep_files: false              # 每次部署清空旧文件

      - name: Stop services
        if: always()
        run: |
          cd docker
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down
          cd ..